<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION</title>
    <style>
        /* 基础设置：全屏黑底，隐藏滚动条 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            overflow: hidden;
        }

        /* 容器居中并设置初始透明度为0 */
        .reveal-container {
            text-align: center;
            opacity: 0;
            animation: slowReveal 4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        /* 核心字样：超大间距，极细字体 */
        h1 {
            font-size: 8vw; /* 根据屏幕宽度自适应大小 */
            font-weight: 300;
            letter-spacing: 2.5vw;
            margin: 0;
            margin-right: -2.5vw; /* 抵消最后一个字母的间距，确保绝对居中 */
            text-transform: uppercase;
        }

        /* 辅助字样：宣告它的存在 */
        .subtext {
            margin-top: 3vh;
            font-size: 1.2vw;
            letter-spacing: 1vw;
            color: #555555;
            text-transform: uppercase;
            margin-right: -1vw;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 { font-size: 12vw; letter-spacing: 3vw; margin-right: -3vw; }
            .subtext { font-size: 3vw; letter-spacing: 1.5vw; margin-right: -1.5vw; margin-top: 20px; }
        }

        /* 电影感显现动画：从模糊到清晰，伴随极其轻微的放大 */
        @keyframes slowReveal {
            0% { 
                opacity: 0; 
                filter: blur(20px); 
                transform: scale(0.95); 
            }
            100% { 
                opacity: 1; 
                filter: blur(0); 
                transform: scale(1); 
            }
        }
    </style>
</head>
<body>

    <div class="reveal-container">
        <h1>Revolution</h1>
        <div class="subtext">它存在</div>
    </div>

</body>
</html>
